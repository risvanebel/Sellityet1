name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter (ESLint & Prettier)
      run: npm run lint

    - name: Run API Tests (Jest)
      run: npm test

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Frontend E2E Tests (Playwright)
      run: npm run test:e2e
