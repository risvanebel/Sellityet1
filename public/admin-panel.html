<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Sellityet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; margin: -20px -20px 20px -20px; }
        .header h1 { font-size: 24px; }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-value { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }
        .error { background: #fee; color: #c00; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .success { background: #efe; color: #0c0; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        button { padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #5568d3; }
        .loading { text-align: center; padding: 40px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏪 Sellityet Admin Panel</h1>
    </div>

    <div id="message"></div>

    <div class="grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-products">-</div>
            <div class="stat-label">Produkte</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-orders">-</div>
            <div class="stat-label">Bestellungen</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-revenue">-</div>
            <div class="stat-label">Umsatz (€)</div>
        </div>
    </div>

    <div class="card">
        <h2>📦 Produkte</h2>
        <div id="products-list">
            <div class="loading">Lade Produkte...</div>
        </div>
    </div>

    <div class="card">
        <h2>📋 Bestellungen</h2>
        <div id="orders-list">
            <div class="loading">Lade Bestellungen...</div>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <button onclick="loadAll()">🔄 Alles neu laden</button>
        <button onclick="logout()">🚪 Ausloggen</button>
    </div>

    <script>
        const API = window.location.origin + '/api';
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');

        // Check auth
        if (!token) {
            window.location.href = 'login.html';
        }

        function showMessage(msg, isError = false) {
            const el = document.getElementById('message');
            el.innerHTML = `<div class="${isError ? 'error' : 'success'}">${msg}</div>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }

        async function apiCall(url) {
            const res = await fetch(API + url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401 || res.status === 403) {
                logout();
                throw new Error('Nicht eingeloggt');
            }
            if (!res.ok) throw new Error('API Fehler: ' + res.status);
            return res.json();
        }

        async function loadStats() {
            try {
                const data = await apiCall('/owner/analytics?period=30');
                document.getElementById('stat-products').textContent = data.top_products?.length || 0;
                document.getElementById('stat-orders').textContent = data.sales?.order_count || 0;
                document.getElementById('stat-revenue').textContent = (data.sales?.total_revenue || 0).toFixed(2);
            } catch (e) {
                console.error('Stats error:', e);
            }
        }

        async function loadProducts() {
            try {
                const products = await apiCall('/owner/products');
                const container = document.getElementById('products-list');
                
                if (products.length === 0) {
                    container.innerHTML = '<p>Keine Produkte vorhanden.</p>';
                    return;
                }

                container.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>Name</th><th>Preis</th><th>Bestand</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                            ${products.map(p => `
                                <tr>
                                    <td>${p.name}</td>
                                    <td>€${p.price}</td>
                                    <td>${p.quantity || 0}</td>
                                    <td><span class="badge ${p.status === 'published' ? 'badge-success' : 'badge-warning'}">${p.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                document.getElementById('products-list').innerHTML = '<p class="error">Fehler beim Laden.</p>';
            }
        }

        async function loadOrders() {
            try {
                const data = await apiCall('/owner/analytics?period=30');
                const orders = data.recent_orders || [];
                const container = document.getElementById('orders-list');
                
                if (orders.length === 0) {
                    container.innerHTML = '<p>Keine Bestellungen vorhanden.</p>';
                    return;
                }

                container.innerHTML = `
                    <table>
                        <thead>
                            <tr><th>Bestellung</th><th>Kunde</th><th>Betrag</th><th>Status</th></tr>
                        </thead>
                        <tbody>
                            ${orders.map(o => `
                                <tr>
                                    <td>${o.order_number}</td>
                                    <td>${o.customer_email}</td>
                                    <td>€${o.total_amount}</td>
                                    <td><span class="badge ${o.status === 'completed' ? 'badge-success' : 'badge-warning'}">${o.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                document.getElementById('orders-list').innerHTML = '<p class="error">Fehler beim Laden.</p>';
            }
        }

        function loadAll() {
            loadStats();
            loadProducts();
            loadOrders();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Initial load
        loadAll();
    </script>
</body>
</html>
