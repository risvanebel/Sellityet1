<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren - Sellityet</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0078D4;
            --primary-dark: #106EBE;
            --surface: #FFFFFF;
            --surface-alt: #F3F2F1;
            --text-primary: #323130;
            --text-secondary: #605E5C;
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--surface-alt);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid #E1DFDD;
            padding: 16px 32px;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
        }
        .brand-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .register-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 480px;
            padding: 48px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .register-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .register-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .role-card {
            border: 2px solid #E1DFDD;
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-card:hover {
            border-color: var(--primary);
        }
        .role-card.active {
            border-color: var(--primary);
            background: rgba(0,120,212,0.05);
        }
        .role-card .icon {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .role-card .label {
            font-size: 14px;
            font-weight: 600;
        }
        .role-card .desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E1DFDD;
            border-radius: var(--radius);
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: var(--primary);
            color: white;
            transition: all 0.2s;
        }
        .btn:hover {
            background: var(--primary-dark);
        }
        .register-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E1DFDD;
        }
        .register-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .error-message {
            background: #FCE8E6;
            color: #C5221F;
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        @media (max-width: 480px) {
            .register-card { padding: 32px 24px; }
            .role-selection { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="brand">
                <div class="brand-logo">S</div>
                <span style="font-size: 20px; font-weight: 600;">Sellityet</span>
            </a>
        </div>
    </header>
    <main class="main">
        <div class="register-card">
            <div class="register-header">
                <h1 class="register-title">Account erstellen</h1>
                <p class="register-subtitle">Wähle, wie du Sellityet nutzen möchtest</p>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <form id="registerForm">
                <div class="role-selection">
                    <div class="role-card" data-role="customer" onclick="selectRole('customer')">
                        <div class="icon">🛒</div>
                        <div class="label">Ich möchte kaufen</div>
                        <div class="desc">Entdecke Shops und Produkte</div>
                    </div>
                    <div class="role-card active" data-role="owner" onclick="selectRole('owner')">
                        <div class="icon">🏪</div>
                        <div class="label">Ich möchte verkaufen</div>
                        <div class="desc">Eröffne deinen eigenen Shop</div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" placeholder="Dein Name" required>
                </div>
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" id="email" placeholder="name@beispiel.de" required>
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="password" placeholder="Mindestens 8 Zeichen" required>
                </div>
                <button type="submit" class="btn">Registrieren</button>
            </form>
            <div class="register-footer">
                <p>Bereits registriert? <a href="/login.html">Anmelden</a></p>
            </div>
        </div>
    </main>
    <script>
        let selectedRole = 'owner';
        function selectRole(role) {
            selectedRole = role;
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-role="${role}"]`).classList.add('active');
        }
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const endpoint = selectedRole === 'owner' ? '/api/auth/register' : '/api/auth/customer/register';
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    if (selectedRole === 'owner') {
                        localStorage.setItem('owner_token', data.token);
                        window.location.href = '/owner.html';
                    } else {
                        localStorage.setItem('customer_token', data.token);
                        window.location.href = '/shop-home.html';
                    }
                } else {
                    document.getElementById('errorMessage').textContent = data.error || 'Registrierung fehlgeschlagen';
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('errorMessage').textContent = 'Netzwerkfehler';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
