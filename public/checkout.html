<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Sellityet</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0078D4;
            --primary-dark: #106EBE;
            --surface: #FFFFFF;
            --surface-alt: #F3F2F1;
            --text-primary: #323130;
            --text-secondary: #605E5C;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--surface-alt);
            min-height: 100vh;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid #E1DFDD;
            padding: 16px 32px;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
        }
        .brand-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .secure-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--accent);
        }
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 48px 24px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 32px;
        }
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 32px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #F3F2F1;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #E1DFDD;
            border-radius: var(--radius);
            font-size: 14px;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .payment-method {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border: 2px solid #E1DFDD;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
        }
        .payment-method:hover {
            border-color: var(--primary);
        }
        .payment-method.active {
            border-color: var(--primary);
            background: rgba(0,120,212,0.05);
        }
        .payment-method input {
            width: 20px;
            height: 20px;
        }
        .order-summary {
            position: sticky;
            top: 24px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .summary-row.total {
            font-size: 18px;
            font-weight: 600;
            padding-top: 16px;
            border-top: 1px solid #E1DFDD;
            margin-top: 16px;
        }
        .btn {
            width: 100%;
            padding: 14px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            text-align: center;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            margin-top: 20px;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 1px solid #E1DFDD;
        }
        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #F3F2F1;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .item-image {
            width: 60px;
            height: 60px;
            background: var(--surface-alt);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .item-info {
            flex: 1;
        }
        .item-name {
            font-weight: 600;
            font-size: 14px;
        }
        .item-qty {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .item-price {
            font-weight: 600;
        }
        @media (max-width: 900px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
            .order-summary {
                position: static;
            }
        }
        @media (max-width: 640px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="brand">
                <div class="brand-logo">S</div>
                <span style="font-size: 20px; font-weight: 600;">Sellityet</span>
            </a>
            <div class="secure-badge">
                <span>🔒</span>
                <span>Sicherer Checkout</span>
            </div>
        </div>
    </header>
    <main class="main">
        <h1 class="page-title">Bestellung abschliessen</h1>
        <div class="checkout-grid">
            <div class="checkout-form">
                <div class="card">
                    <h2 class="card-title">Lieferadresse</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Vorname</label>
                            <input type="text" id="firstName" placeholder="Max">
                        </div>
                        <div class="form-group">
                            <label>Nachname</label>
                            <input type="text" id="lastName" placeholder="Mustermann">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Strasse und Hausnummer</label>
                        <input type="text" id="address" placeholder="Musterstrasse 123">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>PLZ</label>
                            <input type="text" id="zip" placeholder="12345">
                        </div>
                        <div class="form-group">
                            <label>Ort</label>
                            <input type="text" id="city" placeholder="Berlin">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Land</label>
                        <select id="country">
                            <option value="DE">Deutschland</option>
                            <option value="AT">Oesterreich</option>
                            <option value="CH">Schweiz</option>
                        </select>
                    </div>
                </div>
                
                <div class="card">
                    <h2 class="card-title">Kontaktdaten</h2>
                    <div class="form-group">
                        <label>E-Mail</label>
                        <input type="email" id="email" placeholder="max@beispiel.de">
                    </div>
                    <div class="form-group">
                        <label>Telefon (optional)</label>
                        <input type="tel" id="phone" placeholder="+49 123 456789">
                    </div>
                </div>
                
                <div class="card">
                    <h2 class="card-title">Zahlungsmethode</h2>
                    <div class="payment-methods">
                        <label class="payment-method active">
                            <input type="radio" name="payment" value="bank" checked>
                            <span>🏦</span>
                            <div>
                                <div style="font-weight: 600;">Bankueberweisung</div>
                                <div style="font-size: 13px; color: var(--text-secondary);">Ueberweisen Sie nach Bestellung</div>
                            </div>
                        </label>
                        <label class="payment-method">
                            <input type="radio" name="payment" value="paypal">
                            <span>🅿️</span>
                            <div>
                                <div style="font-weight: 600;">PayPal</div>
                                <div style="font-size: 13px; color: var(--text-secondary);">Sicher bezahlen mit PayPal</div>
                            </div>
                        </label>
                        <label class="payment-method">
                            <input type="radio" name="payment" value="card">
                            <span>💳</span>
                            <div>
                                <div style="font-weight: 600;">Kreditkarte</div>
                                <div style="font-size: 13px; color: var(--text-secondary);">Visa, Mastercard, Amex</div>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="order-summary">
                <div class="card">
                    <h2 class="card-title">Zusammenfassung</h2>
                    <div id="cartItems"></div>
                    <div class="summary-row">
                        <span>Zwischensumme</span>
                        <span id="subtotal">0,00 €</span>
                    </div>
                    <div class="summary-row">
                        <span>Versand</span>
                        <span id="shipping">5,90 €</span>
                    </div>
                    <div class="summary-row total">
                        <span>Gesamt</span>
                        <span id="total">0,00 €</span>
                    </div>
                    <button class="btn btn-primary" onclick="placeOrder()">Jetzt kaufen</button>
                    <a href="/cart.html" class="btn btn-secondary" style="margin-top: 12px; display: block;">Zurueck zum Warenkorb</a>
                </div>
            </div>
        </div>
    </main>
    <script>
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                window.location.href = '/cart.html';
                return;
            }
            
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += (item.price || 0) * item.quantity;
                return `
                    <div class="cart-item">
                        <div class="item-image">📦</div>
                        <div class="item-info">
                            <div class="item-name">${item.name || 'Produkt'}</div>
                            <div class="item-qty">Anzahl: ${item.quantity}</div>
                        </div>
                        <div class="item-price">${((item.price || 0) * item.quantity).toLocaleString('de-DE', {style: 'currency', currency: 'EUR'})}</div>
                    </div>
                `;
            }).join('');
            
            const shipping = total > 50 ? 0 : 5.90;
            document.getElementById('subtotal').textContent = total.toLocaleString('de-DE', {style: 'currency', currency: 'EUR'});
            document.getElementById('shipping').textContent = shipping === 0 ? 'Gratis' : shipping.toLocaleString('de-DE', {style: 'currency', currency: 'EUR'});
            document.getElementById('total').textContent = (total + shipping).toLocaleString('de-DE', {style: 'currency', currency: 'EUR'});
        }
        
        function placeOrder() {
            alert('Bestellung wird verarbeitet... (In der Vollversion mit API-Integration)');
        }
        
        document.querySelectorAll('.payment-method').forEach(method => {
            method.addEventListener('click', () => {
                document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('active'));
                method.classList.add('active');
            });
        });
        
        loadCart();
    </script>
</body>
</html>
