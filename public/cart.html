<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warenkorb - Sellityet</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0078D4;
            --primary-dark: #106EBE;
            --surface: #FFFFFF;
            --surface-alt: #F3F2F1;
            --text-primary: #323130;
            --text-secondary: #605E5C;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--surface-alt);
            min-height: 100vh;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid #E1DFDD;
            padding: 16px 32px;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
        }
        .brand-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 24px;
            font-size: 14px;
        }
        .nav-links a:hover {
            color: var(--primary);
        }
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 48px 24px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 32px;
        }
        .cart-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .cart-header {
            padding: 20px 24px;
            border-bottom: 1px solid #E1DFDD;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
        }
        .cart-item {
            padding: 24px;
            border-bottom: 1px solid #F3F2F1;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            align-items: center;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .product-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .product-image {
            width: 80px;
            height: 80px;
            background: var(--surface-alt);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .product-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .product-variant {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .quantity-control button {
            width: 32px;
            height: 32px;
            border: 1px solid #E1DFDD;
            background: white;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 16px;
        }
        .quantity-control span {
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }
        .price {
            font-weight: 600;
        }
        .remove-btn {
            color: #D13438;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }
        .cart-footer {
            padding: 24px;
            border-top: 1px solid #E1DFDD;
            background: var(--surface-alt);
            border-radius: 0 0 var(--radius) var(--radius);
        }
        .cart-totals {
            max-width: 300px;
            margin-left: auto;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .total-row.grand-total {
            font-size: 18px;
            font-weight: 600;
            padding-top: 12px;
            border-top: 1px solid #E1DFDD;
        }
        .btn {
            width: 100%;
            padding: 14px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            margin-top: 20px;
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-secondary {
            background: white;
            color: var(--text-primary);
            border: 1px solid #E1DFDD;
        }
        .empty-cart {
            text-align: center;
            padding: 80px 24px;
        }
        .empty-cart-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        .empty-cart h2 {
            font-size: 20px;
            margin-bottom: 12px;
        }
        .empty-cart p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        @media (max-width: 768px) {
            .cart-header { display: none; }
            .cart-item {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="brand">
                <div class="brand-logo">S</div>
                <span style="font-size: 20px; font-weight: 600;">Sellityet</span>
            </a>
            <nav class="nav-links">
                <a href="/shop-home.html">Weiter einkaufen</a>
            </nav>
        </div>
    </header>
    <main class="main">
        <h1 class="page-title">Warenkorb</h1>
        <div id="cartContent">
            <div class="cart-card">
                <div class="cart-header">
                    <span>Produkt</span>
                    <span>Menge</span>
                    <span>Preis</span>
                    <span></span>
                </div>
                <div id="cartItems"></div>
                <div class="cart-footer">
                    <div class="cart-totals">
                        <div class="total-row">
                            <span>Zwischensumme</span>
                            <span id="subtotal">0,00 €</span>
                        </div>
                        <div class="total-row">
                            <span>Versand</span>
                            <span id="shipping">5,90 €</span>
                        </div>
                        <div class="total-row grand-total">
                            <span>Gesamt</span>
                            <span id="total">0,00 €</span>
                        </div>
                        <a href="/checkout.html" class="btn btn-primary">Zur Kasse</a>
                        <a href="/shop-home.html" class="btn btn-secondary" style="margin-top: 12px;">Weiter einkaufen</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const container = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                document.getElementById('cartContent').innerHTML = `
                    <div class="cart-card empty-cart">
                        <div class="empty-cart-icon" style="font-size: 48px; color: #605E5C;">Warenkorb</div>
                        <h2>Dein Warenkorb ist leer</h2>
                        <p>Entdecke Produkte und füge sie deinem Warenkorb hinzu</p>
                        <a href="/shop-home.html" class="btn btn-primary" style="width: auto; padding: 12px 32px;">Zum Shop</a>
                    </div>
                `;
                return;
            }
            
            let total = 0;
            container.innerHTML = cart.map((item, index) => {
                total += (item.price || 0) * item.quantity;
                return `
                    <div class="cart-item">
                        <div class="product-info">
                            <div class="product-image" style="background: #F3F2F1; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #605E5C;">Bild</div>
                            <div>
                                <div class="product-name">${item.name || 'Produkt'}</div>
                                <div class="product-variant">${item.variant || ''}</div>
                            </div>
                        </div>
                        <div class="quantity-control">
                            <button onclick="updateQuantity(${index}, -1)">−</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${index}, 1)">+</button>
                        </div>
                        <div class="price">${((item.price || 0) * item.quantity).toLocaleString('de-DE', {style: 'currency', currency: 'EUR'})}</div>
                        <button class="remove-btn" onclick="removeItem(${index})">Entfernen</button>
                    </div>
                `;
            }).join('');
            
            const shipping = total > 50 ? 0 : 5.90;
            document.getElementById('subtotal').textContent = total.toLocaleString('de-DE', {style: 'currency', currency: 'EUR'});
            document.getElementById('shipping').textContent = shipping === 0 ? 'Gratis' : shipping.toLocaleString('de-DE', {style: 'currency', currency: 'EUR'});
            document.getElementById('total').textContent = (total + shipping).toLocaleString('de-DE', {style: 'currency', currency: 'EUR'});
        }
        
        function updateQuantity(index, delta) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }
        
        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            loadCart();
        }
        
        loadCart();
    </script>
</body>
</html>
