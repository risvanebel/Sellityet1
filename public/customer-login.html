<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunden Login - Sellityet</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0078D4;
            --primary-dark: #106EBE;
            --surface: #FFFFFF;
            --surface-alt: #F3F2F1;
            --text-primary: #323130;
            --text-secondary: #605E5C;
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.16);
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--surface-alt);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--surface);
            border-bottom: 1px solid #E1DFDD;
            padding: 16px 32px;
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
        }
        .brand-logo {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
        }
        .login-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            padding: 48px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            color: white;
        }
        .login-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E1DFDD;
            border-radius: var(--radius);
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn {
            width: 100%;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: var(--primary);
            color: white;
        }
        .btn:hover {
            background: var(--primary-dark);
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E1DFDD;
        }
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .error-message {
            background: #FCE8E6;
            color: #C5221F;
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="brand">
                <div class="brand-logo">S</div>
                <span style="font-size: 20px; font-weight: 600;">Sellityet</span>
            </a>
        </div>
    </header>
    <main class="main">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">👤</div>
                <h1 class="login-title">Kunden-Login</h1>
                <p class="login-subtitle">Melde dich an, um deine Bestellungen zu sehen</p>
            </div>
            <div class="error-message" id="errorMessage"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>E-Mail</label>
                    <input type="email" id="email" placeholder="name@beispiel.de" required>
                </div>
                <div class="form-group">
                    <label>Passwort</label>
                    <input type="password" id="password" placeholder="Passwort" required>
                </div>
                <button type="submit" class="btn">Anmelden</button>
            </form>
            <div class="login-footer">
                <p>Noch kein Konto? <a href="#" onclick="showRegister()">Registrieren</a></p>
            </div>
            
            <!-- Register Form -->
            <form id="registerForm" style="display: none;">
                <h2 style="text-align: center; margin-bottom: 24px; font-size: 20px;">Kunden-Registrierung</h2>
                <div class="form-group">
                    <label>Vorname</label>
                    <input type="text" id="regFirstName" placeholder="Vorname">
                </div>
                <div class="form-group">
                    <label>Nachname</label>
                    <input type="text" id="regLastName" placeholder="Nachname">
                </div>
                <div class="form-group">
                    <label>E-Mail *</label>
                    <input type="email" id="regEmail" placeholder="name@beispiel.de" required>
                </div>
                <div class="form-group">
                    <label>Passwort *</label>
                    <input type="password" id="regPassword" placeholder="Passwort" required>
                </div>
                <div class="form-group" id="regCodeGroup">
                    <label>Registrierungscode *</label>
                    <input type="text" id="regCode" placeholder="Code eingeben">
                    <p style="font-size: 12px; color: #666; margin-top: 4px;">Dieser Shop erfordert einen Registrierungscode.</p>
                </div>
                <button type="submit" class="btn">Registrieren</button>
                <div style="text-align: center; margin-top: 16px;">
                    <a href="#" onclick="showLogin()" style="color: var(--primary); text-decoration: none; font-size: 14px;">Bereits registriert? Anmelden</a>
                </div>
            </form>
        </div>
    </main>
    <script>
        let shopRequiresCode = false;
        
        // Check if shop requires registration code
        async function checkShopSettings() {
            try {
                let res = await fetch('/api/shop/current');
                if (!res.ok) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const shopSlug = urlParams.get('shop');
                    if (shopSlug) {
                        res = await fetch(`/api/shops/${shopSlug}`);
                    }
                }
                if (res.ok) {
                    const shop = await res.json();
                    if (shop.registration_code && shop.registration_code.length > 0) {
                        shopRequiresCode = true;
                        document.getElementById('regCodeGroup').style.display = 'block';
                        document.getElementById('regCode').required = true;
                    } else {
                        shopRequiresCode = false;
                        document.getElementById('regCodeGroup').style.display = 'none';
                        document.getElementById('regCode').required = false;
                    }
                }
            } catch (e) {
                console.error('Error checking shop:', e);
            }
        }
        
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.querySelector('.login-footer').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.querySelector('.login-title').textContent = 'Kunden-Registrierung';
            document.querySelector('.login-subtitle').textContent = 'Erstelle dein Kundenkonto';
            checkShopSettings();
        }
        
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.querySelector('.login-footer').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.querySelector('.login-title').textContent = 'Kunden-Login';
            document.querySelector('.login-subtitle').textContent = 'Melde dich an, um deine Bestellungen zu sehen';
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('/api/auth/customer/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('customer_token', data.token);
                    window.location.href = '/customer-dashboard.html';
                } else {
                    document.getElementById('errorMessage').textContent = data.error || 'Login fehlgeschlagen';
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('errorMessage').textContent = 'Netzwerkfehler';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const regCode = document.getElementById('regCode').value;
            
            try {
                const res = await fetch('/api/auth/register-customer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email, 
                        password, 
                        first_name: firstName, 
                        last_name: lastName,
                        registration_code: regCode || undefined
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('customer_token', data.token);
                    window.location.href = '/customer-dashboard.html';
                } else {
                    document.getElementById('errorMessage').textContent = data.error || 'Registrierung fehlgeschlagen';
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('errorMessage').textContent = 'Netzwerkfehler';
                document.getElementById('errorMessage').style.display = 'block';
            }
        });
    </script>
</body>
</html>
