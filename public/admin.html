<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellityet Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F8FAFC;
            color: #0F172A;
        }
        .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
        .sidebar {
            background: white;
            border-right: 1px solid #E2E8F0;
            position: fixed;
            height: 100vh;
            width: 260px;
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 24px; border-bottom: 1px solid #E2E8F0; }
        .logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 32px; height: 32px; background: #2563EB; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
        .nav { flex: 1; padding: 16px 12px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #64748B;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .nav-item:hover, .nav-item.active { background: #EFF6FF; color: #2563EB; }
        .main { margin-left: 260px; min-height: 100vh; }
        .header {
            background: white;
            border-bottom: 1px solid #E2E8F0;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .content { padding: 32px; max-width: 1400px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 24px;
        }
        .stat-label { font-size: 14px; color: #64748B; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .card {
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title { font-size: 16px; font-weight: 600; }
        .card-body { padding: 24px; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: #2563EB; color: white; }
        .btn-secondary { background: white; color: #0F172A; border: 1px solid #E2E8F0; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { padding: 12px 16px; text-align: left; font-weight: 600; color: #64748B; font-size: 12px; text-transform: uppercase; background: #F8FAFC; border-bottom: 1px solid #E2E8F0; }
        td { padding: 16px; border-bottom: 1px solid #E2E8F0; }
        tr:hover td { background: #F8FAFC; }
        .badge {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: #D1FAE5; color: #065F46; }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-danger { background: #FEE2E2; color: #991B1B; }
        .badge-neutral { background: #F1F5F9; color: #64748B; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
        .form-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            font-size: 14px;
        }
        .form-input:focus { outline: none; border-color: #2563EB; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 8px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow: hidden;
        }
        .modal-header { padding: 20px 24px; border-bottom: 1px solid #E2E8F0; display: flex; justify-content: space-between; }
        .modal-body { padding: 24px; overflow-y: auto; max-height: 60vh; }
        .modal-footer { padding: 20px 24px; border-top: 1px solid #E2E8F0; display: flex; justify-content: flex-end; gap: 12px; }
        .section { display: none; }
        .section.active { display: block; }
        .empty-state { text-align: center; padding: 64px; color: #64748B; }
        .loading { text-align: center; padding: 40px; color: #64748B; }
        .error { background: #FEE2E2; color: #991B1B; padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">S</div>
                    <span>Sellityet</span>
                </div>
            </div>
            <nav class="nav">
                <div class="nav-item active" onclick="showSection('dashboard')">Dashboard</div>
                <div class="nav-item" onclick="showSection('products')">Produkte</div>
                <div class="nav-item" onclick="showSection('orders')">Bestellungen</div>
                <div class="nav-item" onclick="showSection('shop')">Shop</div>
            </nav>
        </aside>

        <main class="main">
            <header class="header">
                <h1 id="page-title">Dashboard</h1>
                <button class="btn btn-primary" onclick="openProductModal()">+ Neues Produkt</button>
            </header>

            <div class="content">
                <!-- Dashboard -->
                <div id="dashboard" class="section active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">Produkte</div>
                            <div class="stat-value" id="stat-products">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Bestellungen</div>
                            <div class="stat-value" id="stat-orders">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Umsatz</div>
                            <div class="stat-value" id="stat-revenue">-</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Kunden</div>
                            <div class="stat-value" id="stat-customers">-</div>
                        </div>
                    </div>
                </div>

                <!-- Products -->
                <div id="products" class="section">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Produkte</h3>
                        </div>
                        <div class="card-body">
                            <div id="products-table-container">
                                <div class="loading">Lade Produkte...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Orders -->
                <div id="orders" class="section">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Bestellungen</h3>
                        </div>
                        <div class="card-body">
                            <div id="orders-table-container">
                                <div class="loading">Lade Bestellungen...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Shop Settings -->
                <div id="shop" class="section">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Shop-Einstellungen</h3>
                        </div>
                        <div class="card-body">
                            <div id="shop-settings-container">
                                <div class="loading">Lade Shop-Daten...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>Neues Produkt</h3>
                <button onclick="closeProductModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="product-error"></div>
                <div class="form-group">
                    <label class="form-label">Name *</label>
                    <input type="text" class="form-input" id="product-name" placeholder="Produktname">
                </div>
                <div class="form-group">
                    <label class="form-label">Beschreibung</label>
                    <textarea class="form-input" id="product-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Preis (€) *</label>
                    <input type="number" class="form-input" id="product-price" step="0.01" placeholder="19.99">
                </div>
                <div class="form-group">
                    <label class="form-label">Kategorie</label>
                    <select class="form-input" id="product-category">
                        <option value="">Wähle...</option>
                        <option value="E-Liquid">E-Liquid</option>
                        <option value="Hardware">Hardware</option>
                        <option value="Zubehör">Zubehör</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Anfangsbestand</label>
                    <input type="number" class="form-input" id="product-stock" value="0">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeProductModal()">Abbrechen</button>
                <button class="btn btn-primary" onclick="saveProduct()">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let authToken = localStorage.getItem('token');
        let currentShop = null;

        // Check auth
        if (!authToken) {
            window.location.href = '/login.html';
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            event.target.classList.add('active');
            document.getElementById('page-title').textContent = 
                section === 'dashboard' ? 'Dashboard' :
                section === 'products' ? 'Produkte' :
                section === 'orders' ? 'Bestellungen' : 'Shop';
            
            if (section === 'products') loadProducts();
            if (section === 'orders') loadOrders();
            if (section === 'shop') loadShop();
            if (section === 'dashboard') loadStats();
        }

        async function loadStats() {
            try {
                const res = await fetch(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await res.json();
                document.getElementById('stat-products').textContent = data.products;
                document.getElementById('stat-orders').textContent = data.orders;
                document.getElementById('stat-revenue').textContent = '€' + data.totalRevenue.toFixed(2);
                document.getElementById('stat-customers').textContent = data.users;
            } catch (e) {
                console.error('Stats error:', e);
            }
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${API_URL}/owner/products`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const products = await res.json();
                
                if (products.length === 0) {
                    document.getElementById('products-table-container').innerHTML = 
                        '<div class="empty-state">Noch keine Produkte. Erstelle dein erstes Produkt!</div>';
                    return;
                }

                const html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Kategorie</th>
                                <th>Preis</th>
                                <th>Bestand</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${products.map(p => `
                                <tr>
                                    <td>${p.name}</td>
                                    <td>${p.category_name || '-'}</td>
                                    <td>€${p.price}</td>
                                    <td>${p.quantity || 0}</td>
                                    <td><span class="badge ${p.status === 'published' ? 'badge-success' : 'badge-neutral'}">${p.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                document.getElementById('products-table-container').innerHTML = html;
            } catch (e) {
                document.getElementById('products-table-container').innerHTML = 
                    '<div class="error">Fehler beim Laden der Produkte</div>';
            }
        }

        async function loadOrders() {
            document.getElementById('orders-table-container').innerHTML = 
                '<div class="empty-state">Bestellungs-Feature kommt bald...</div>';
        }

        async function loadShop() {
            try {
                const res = await fetch(`${API_URL}/owner/shops`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const shops = await res.json();
                
                if (shops.length === 0) {
                    document.getElementById('shop-settings-container').innerHTML = 
                        '<div class="empty-state">Noch kein Shop erstellt.</div>';
                    return;
                }

                const shop = shops[0];
                currentShop = shop;
                
                document.getElementById('shop-settings-container').innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Shop-Name</label>
                        <input type="text" class="form-input" value="${shop.name}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Slug</label>
                        <input type="text" class="form-input" value="${shop.slug}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Beschreibung</label>
                        <textarea class="form-input" rows="3" readonly>${shop.description || ''}</textarea>
                    </div>
                `;
            } catch (e) {
                document.getElementById('shop-settings-container').innerHTML = 
                    '<div class="error">Fehler beim Laden des Shops</div>';
            }
        }

        function openProductModal() {
            document.getElementById('product-modal').classList.add('active');
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.remove('active');
            document.getElementById('product-error').innerHTML = '';
        }

        async function saveProduct() {
            const name = document.getElementById('product-name').value;
            const description = document.getElementById('product-description').value;
            const price = document.getElementById('product-price').value;
            const category = document.getElementById('product-category').value;
            const stock = document.getElementById('product-stock').value;

            if (!name || !price) {
                document.getElementById('product-error').innerHTML = '<div class="error">Name und Preis sind erforderlich</div>';
                return;
            }

            try {
                // First ensure we have a shop
                if (!currentShop) {
                    const shopRes = await fetch(`${API_URL}/owner/shops`, {
                        headers: { 'Authorization': `Bearer ${authToken}` }
                    });
                    const shops = await shopRes.json();
                    if (shops.length === 0) {
                        document.getElementById('product-error').innerHTML = '<div class="error">Erstelle zuerst einen Shop</div>';
                        return;
                    }
                    currentShop = shops[0];
                }

                const res = await fetch(`${API_URL}/owner/products`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        shop_id: currentShop.id,
                        name,
                        description,
                        price: parseFloat(price),
                        category_id: category ? 1 : null, // Simplified
                        initial_quantity: parseInt(stock)
                    })
                });

                if (res.ok) {
                    closeProductModal();
                    loadProducts();
                    loadStats();
                } else {
                    const err = await res.json();
                    document.getElementById('product-error').innerHTML = `<div class="error">${err.error}</div>`;
                }
            } catch (e) {
                document.getElementById('product-error').innerHTML = '<div class="error">Netzwerkfehler</div>';
            }
        }

        // Initial load
        loadStats();
    </script>
</body>
</html>
